<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Sesiones ANR — Son Espases</title>
  <meta name="theme-color" content="#060d09" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #060d09;
      --bg2:        #0b1810;
      --surface:    #0f2016;
      --surface2:   #162b1c;
      --surface3:   #1c3523;
      --green:      #00c878;
      --green2:     #00a862;
      --green-dim:  rgba(0,200,120,0.15);
      --green-glow: rgba(0,200,120,0.25);
      --text:       #e8f5ee;
      --muted:      #6b9478;
      --border:     rgba(0,200,120,0.12);
      --border2:    rgba(0,200,120,0.22);
      --radius:     16px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      overflow-x: hidden;
    }

    /* ── Ambient background glow ── */
    body::before {
      content: '';
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(0,200,120,0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Header ── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: linear-gradient(180deg, #060d09 55%, transparent);
      padding: 18px 16px 0;
    }

    .header-top {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    /* Logo / stethoscope icon */
    .logo-icon {
      width: 42px;
      height: 42px;
      border-radius: 13px;
      background: linear-gradient(145deg, #0f2a1a, #1a4028);
      border: 1px solid var(--border2);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 0 18px rgba(0,200,120,0.2);
    }
    .logo-icon svg {
      width: 24px;
      height: 24px;
    }

    .logo-text { flex: 1; min-width: 0; }
    .logo-title {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.1px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .logo-sub {
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
    }

    .update-badge {
      font-size: 10px;
      color: var(--green);
      background: var(--green-dim);
      border: 1px solid var(--border2);
      border-radius: 20px;
      padding: 4px 10px;
      white-space: nowrap;
      flex-shrink: 0;
      font-weight: 600;
    }

    /* ── Search ── */
    .search-wrap {
      position: relative;
      margin-bottom: 14px;
    }
    .search-wrap .ico-search {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      width: 16px;
      height: 16px;
      fill: var(--muted);
      pointer-events: none;
    }
    #search {
      width: 100%;
      height: 42px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      color: var(--text);
      font-size: 14px;
      padding: 0 36px 0 38px;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    #search::placeholder { color: var(--muted); }
    #search:focus {
      border-color: var(--green2);
      box-shadow: 0 0 0 3px rgba(0,200,120,0.1);
    }
    .search-clear {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: var(--surface2);
      border: none;
      color: var(--muted);
      border-radius: 50%;
      width: 22px;
      height: 22px;
      display: none;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 13px;
    }
    .search-clear.visible { display: flex; }

    /* ── Category chips ── */
    .chips-wrap {
      overflow-x: auto;
      white-space: nowrap;
      padding-bottom: 14px;
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    .chips-wrap::-webkit-scrollbar { display: none; }
    .chips-inner { display: inline-flex; gap: 8px; padding: 0 2px; }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      height: 34px;
      padding: 0 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all .18s;
      user-select: none;
      white-space: nowrap;
    }
    .chip:hover {
      border-color: var(--green2);
      color: var(--text);
      background: var(--surface2);
    }
    .chip.active {
      background: var(--green-dim);
      border-color: var(--green);
      color: var(--green);
      box-shadow: 0 0 12px rgba(0,200,120,0.15);
    }
    .chip-count {
      font-size: 11px;
      font-weight: 700;
      opacity: .8;
    }

    /* ── Main ── */
    main {
      position: relative;
      z-index: 1;
      padding: 10px 12px 40px;
    }

    .results-info {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 14px;
      padding: 0 2px;
      min-height: 18px;
    }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 14px;
    }
    @media (max-width: 380px) {
      .grid { grid-template-columns: 1fr; }
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      transition: transform .2s, border-color .2s, box-shadow .2s;
      text-decoration: none;
      color: inherit;
      display: block;
      -webkit-tap-highlight-color: transparent;
    }
    .card:hover, .card:focus-visible {
      transform: translateY(-3px);
      border-color: var(--border2);
      box-shadow: 0 8px 28px rgba(0,0,0,.5), 0 0 0 1px rgba(0,200,120,0.08);
      outline: none;
    }
    .card:active { transform: scale(.98); }

    /* Thumbnail */
    .thumb-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 16/9;
      background: var(--surface2);
      overflow: hidden;
    }
    .thumb-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform .3s;
    }
    .card:hover .thumb-wrap img { transform: scale(1.04); }

    /* Play overlay */
    .play-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, transparent 30%, rgba(0,0,0,.55) 100%);
      opacity: 0;
      transition: opacity .2s;
    }
    .card:hover .play-overlay { opacity: 1; }
    .play-btn-circle {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: rgba(0,200,120,0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 28px rgba(0,200,120,0.6);
    }
    .play-btn-circle svg { width: 22px; height: 22px; fill: #fff; margin-left: 3px; }

    .duration-badge {
      position: absolute;
      bottom: 7px;
      right: 7px;
      background: rgba(0,0,0,.75);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 5px;
      letter-spacing: .3px;
    }

    /* Card body */
    .card-body { padding: 13px 13px 11px; }
    .card-title {
      font-size: 14px;
      font-weight: 600;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 9px;
      color: var(--text);
    }
    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .card-date {
      font-size: 11px;
      color: var(--muted);
      flex-shrink: 0;
    }
    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      justify-content: flex-end;
    }
    .tag {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 10px;
      background: var(--green-dim);
      color: var(--green);
      border: 1px solid rgba(0,200,120,0.2);
      font-weight: 600;
    }

    /* ── Empty / error states ── */
    .state-msg {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 72px 24px;
      color: var(--muted);
      text-align: center;
      grid-column: 1 / -1;
    }
    .state-msg svg { width: 52px; height: 52px; opacity: .35; fill: var(--green); }
    .state-msg p { font-size: 14px; line-height: 1.6; }
    .state-msg code {
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 2px 7px;
      border-radius: 5px;
      font-size: 12px;
      color: var(--green);
    }

    /* ── Skeleton loader ── */
    .skeleton {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .skel-thumb {
      width: 100%;
      aspect-ratio: 16/9;
      background: linear-gradient(90deg, var(--surface2) 25%, var(--surface3) 50%, var(--surface2) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }
    .skel-body { padding: 13px; display: flex; flex-direction: column; gap: 9px; }
    .skel-line {
      height: 11px;
      border-radius: 6px;
      background: linear-gradient(90deg, var(--surface2) 25%, var(--surface3) 50%, var(--surface2) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }
    .skel-line.short { width: 50%; }
    @keyframes shimmer { to { background-position: -200% 0; } }

    /* ── Divider ── */
    .section-divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 4px 0 16px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .8px;
    }
    .section-divider::before, .section-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
  </style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="logo-icon">
      <!-- Stethoscope SVG -->
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M19 8C19 11.31 16.31 14 13 14C9.69 14 7 11.31 7 8" stroke="#00c878" stroke-width="1.6" stroke-linecap="round"/>
        <path d="M7 8V4C7 3.45 7.45 3 8 3H10C10.55 3 11 3.45 11 4V8" stroke="#00c878" stroke-width="1.6" stroke-linecap="round"/>
        <path d="M13 8V4C13 3.45 13.45 3 14 3H16C16.55 3 17 3.45 17 4V8" stroke="#00c878" stroke-width="1.6" stroke-linecap="round"/>
        <path d="M13 14V17C13 19.21 11.21 21 9 21C6.79 21 5 19.21 5 17V15" stroke="#00c878" stroke-width="1.6" stroke-linecap="round"/>
        <circle cx="5" cy="14" r="1.5" stroke="#00c878" stroke-width="1.4"/>
        <circle cx="19" cy="8" r="1.2" fill="#00c878"/>
      </svg>
    </div>
    <div class="logo-text">
      <div class="logo-title">Sesiones ANR</div>
      <div class="logo-sub">H.U. Son Espases · Anestesiología</div>
    </div>
    <span class="update-badge" id="updateBadge">—</span>
  </div>

  <div class="search-wrap">
    <svg class="ico-search" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
    <input type="search" id="search" placeholder="Buscar sesión…" autocomplete="off" spellcheck="false" />
    <button class="search-clear" id="searchClear" aria-label="Borrar">✕</button>
  </div>

  <div class="chips-wrap">
    <div class="chips-inner" id="chips"></div>
  </div>
</header>

<main>
  <div class="results-info" id="resultsInfo"></div>
  <div class="grid" id="grid"></div>
</main>

<script>
/* ── Categories ── */
const CATEGORIES = [
  { id: 'all',          label: 'Todos',                  keywords: null },
  { id: 'pediatria',    label: 'Pediatría',              keywords: ['pediatr','pediátr','neonat','infant','niño','niña','recién nacido','neonatal'] },
  { id: 'toracica',     label: 'Cirugía torácica',       keywords: ['torác','tórax','toraci','pulmon','lobectom','neumonectom','toracoscop','mediastin','pleural','neumotórax','pulmón','ventilación protección'] },
  { id: 'cardiaca',     label: 'Cirugía cardíaca',       keywords: ['cardíac','cardiac','cardiaca','corazón','heart','valvul','valv','bypass','coronar','aorta','cec','extracorpórea','tavi','teer','miocardi','pericardi','arritmia','fibrilación','ecocardiograf'] },
  { id: 'neuro',        label: 'Neuroanestesia',         keywords: ['neuroanest','neurocirugía','cerebral','intracraneal','craneal','cráneo','columna','espinal','medular','neuro','craneotom','tec'] },
  { id: 'regional',     label: 'Anestesia regional',     keywords: ['regional','bloqueo','block','plexo','nervio','epidural','raquídea','intradural','subaracnoid','tap block','pecs','fascial','infiltración','quadratus','serratus','paravertebral','erector spinae','esp block','interescalén','supraclavicular','infraclavicular','axilar','femoral','ciático','safeno','poplíteo','prilocaína'] },
  { id: 'dolor',        label: 'Dolor postoperatorio',   keywords: ['dolor','pain','postoperat','analgesia','analgés','opioide','opioid','fentanilo','morfin','multimodal','pca','gabapentin','pregabalina','tramadol','ketorolaco','dolor agudo','dolor crónico','sufentanilo'] },
  { id: 'viaarea',      label: 'Vía aérea',              keywords: ['vía aérea','airway','intubación','intubat','laringoscop','mascarilla laríng','supraglót','videolaringoscop','fibroscop','fibroptia','cricotiroid','traqueotom','laringoscopia','vía aérea difícil','extubación','laringoespasmo'] },
  { id: 'uci',          label: 'Reanimación / UCI',      keywords: ['reanimat','uci','uvi','crítico','crítica','intensiv','resucitación','shock','sepsis','ventilación mecánica','rcp','ecmo','trauma','emergencia','urgencia','parada cardíaca','rcp','tep','angiotensina','oxemia'] },
  { id: 'farmaco',      label: 'Farmacología',           keywords: ['farmacol','fármaco','drug','propofol','sevoflur','desflur','isofluran','rocuroni','cisatracuri','sugamadex','neostigmin','dexmedetomidin','midazolam','remifentanilo','relajante','bloqueante neuromuscular','reversi','halogenad','ketamin'] },
  { id: 'casos',        label: 'Casos clínicos',         keywords: ['caso clínico','caso clini','clinical case','presentación de caso','sesión clínica','a propósito de'] },
  { id: 'gestion',      label: 'Gestión y seguridad',    keywords: ['seguridad','gestión','protocolo','checklist','error','incidente','calidad','simulación','formación','crisis','comunicación','trabajo en equipo','pbm','hemorragia masiva','hipec','recuperación intensificada','sensar','dynamed','novedades'] },
  { id: 'obstetricia',  label: 'Obstetricia',            keywords: ['obstetric','obstétric','embarazad','cesárea','parto','matern','perinatal','prenatal','placenta','eclampsia','preeclampsia'] },
];

function categorise(title) {
  const t = title.toLowerCase();
  const cats = CATEGORIES.filter(c => c.keywords && c.keywords.some(kw => t.includes(kw)));
  return cats.length ? cats.map(c => c.id) : ['uncategorised'];
}

function formatDate(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleDateString('es-ES', { day:'2-digit', month:'short', year:'numeric' });
}

/* ── State ── */
let allVideos = [], activeCategory = 'all', searchQuery = '';

const grid       = document.getElementById('grid');
const chips      = document.getElementById('chips');
const searchEl   = document.getElementById('search');
const searchClear= document.getElementById('searchClear');
const resultsInfo= document.getElementById('resultsInfo');
const updateBadge= document.getElementById('updateBadge');

/* ── Chips ── */
function buildChips(videos) {
  const counts = { all: videos.length };
  CATEGORIES.forEach(c => { if (c.id !== 'all') counts[c.id] = 0; });
  counts['uncategorised'] = 0;
  videos.forEach(v => v.categories.forEach(cid => { if (counts[cid] !== undefined) counts[cid]++; else counts[cid]=1; }));

  chips.innerHTML = '';
  const allCats = [...CATEGORIES];
  if (counts['uncategorised'] > 0) allCats.push({ id: 'uncategorised', label: 'Sin clasificar' });

  allCats.forEach(cat => {
    const n = counts[cat.id] || 0;
    if (cat.id !== 'all' && n === 0) return;
    const el = document.createElement('button');
    el.className = 'chip' + (cat.id === activeCategory ? ' active' : '');
    el.dataset.id = cat.id;
    el.innerHTML = `${cat.label} <span class="chip-count">${n}</span>`;
    el.addEventListener('click', () => {
      activeCategory = cat.id;
      document.querySelectorAll('.chip').forEach(c => c.classList.toggle('active', c.dataset.id === activeCategory));
      render();
      el.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
    });
    chips.appendChild(el);
  });
}

/* ── Render ── */
function render() {
  const q = searchQuery.trim().toLowerCase();
  let filtered = allVideos.filter(v =>
    (activeCategory === 'all' || v.categories.includes(activeCategory)) &&
    (!q || v.title.toLowerCase().includes(q))
  );
  filtered.sort((a, b) => new Date(b.publishedAt) - new Date(a.publishedAt));

  if (q)
    resultsInfo.textContent = `${filtered.length} resultado${filtered.length !== 1 ? 's' : ''} para "${searchQuery.trim()}"`;
  else if (activeCategory !== 'all') {
    const label = [...CATEGORIES, { id:'uncategorised', label:'Sin clasificar' }].find(c => c.id === activeCategory)?.label || activeCategory;
    resultsInfo.textContent = `${filtered.length} vídeo${filtered.length !== 1 ? 's' : ''} · ${label}`;
  } else {
    resultsInfo.textContent = `${filtered.length} vídeo${filtered.length !== 1 ? 's' : ''} en total`;
  }

  if (!filtered.length) {
    grid.innerHTML = `<div class="state-msg">
      <svg viewBox="0 0 24 24"><path d="M11 15h2v2h-2zm0-8h2v6h-2zm1-5C6.47 2 2 6.5 2 12a10 10 0 0 0 10 10 10 10 0 0 0 10-10A10 10 0 0 0 12 2zm0 18a8 8 0 0 1-8-8 8 8 0 0 1 8-8 8 8 0 0 1 8 8 8 8 0 0 1-8 8z"/></svg>
      <p>No se encontraron vídeos.<br>Prueba con otro término o categoría.</p>
    </div>`;
    return;
  }

  grid.innerHTML = filtered.map(v => {
    const tags = v.categories.filter(c => c !== 'uncategorised').slice(0, 2)
      .map(c => { const cat = CATEGORIES.find(x => x.id === c); return cat ? `<span class="tag">${cat.label}</span>` : ''; }).join('');
    return `<a class="card" href="https://www.youtube.com/watch?v=${v.videoId}" target="_blank" rel="noopener" aria-label="${esc(v.title)}">
      <div class="thumb-wrap">
        <img src="https://i.ytimg.com/vi/${v.videoId}/mqdefault.jpg" alt="" loading="lazy" decoding="async" />
        <div class="play-overlay">
          <div class="play-btn-circle">
            <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
          </div>
        </div>
        ${v.duration ? `<span class="duration-badge">${v.duration}</span>` : ''}
      </div>
      <div class="card-body">
        <div class="card-title">${esc(v.title)}</div>
        <div class="card-footer">
          <span class="card-date">${formatDate(v.publishedAt)}</span>
          <div class="card-tags">${tags}</div>
        </div>
      </div>
    </a>`;
  }).join('');
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ── Skeleton ── */
function showSkeleton() {
  grid.innerHTML = Array.from({length: 8}, () => `
    <div class="skeleton">
      <div class="skel-thumb"></div>
      <div class="skel-body"><div class="skel-line"></div><div class="skel-line short"></div></div>
    </div>`).join('');
}

/* ── Load ── */
async function loadVideos() {
  showSkeleton();
  try {
    const res = await fetch('./videos.json?_=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();

    allVideos = (data.videos || []).map(v => ({
      ...v,
      categories: v.categories?.length ? v.categories : categorise(v.title),
    }));

    if (data.updatedAt) {
      const d = new Date(data.updatedAt);
      updateBadge.textContent = d.toLocaleDateString('es-ES', { day:'2-digit', month:'short', year:'2-digit' });
    }

    buildChips(allVideos);
    render();
  } catch(e) {
    grid.innerHTML = `<div class="state-msg">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
      <p><strong>No se pudo cargar videos.json</strong><br>
      Ejecuta <code>python fetch_videos.py</code> o lanza<br>el workflow de GitHub Actions manualmente.</p>
    </div>`;
  }
}

/* ── Search ── */
searchEl.addEventListener('input', () => {
  searchQuery = searchEl.value;
  searchClear.classList.toggle('visible', searchQuery.length > 0);
  render();
});
searchClear.addEventListener('click', () => {
  searchEl.value = ''; searchQuery = '';
  searchClear.classList.remove('visible');
  searchEl.focus();
  render();
});

loadVideos();
</script>
</body>
</html>
